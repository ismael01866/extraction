name: CI

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  extraction-ui:
    name: extraction-ui
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter extraction-ui lint
      - run: pnpm --filter extraction-ui type-check
      - run: pnpm --filter extraction-ui test
      - run: pnpm --filter extraction-ui build

  docs:
    name: docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter docs type-check
      - run: pnpm --filter docs build
