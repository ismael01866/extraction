name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm --filter extraction-ui build

      - name: Create Release / Publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm --filter extraction-ui publish --no-git-checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Switch to a PAT if other workflows need to trigger on these commits
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
